name: Backup Database

on:
  workflow_dispatch: # TODO: DELETE AFTER TESTING
  schedule:
    - cron: '0 11 1 * *'

jobs:
  backup-database:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [
          18
        ]

    name: Backup Database
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
      - name: Install MongoDB Database Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mongodb-database-tools
      - name: Install
        env:
          GITHUB_PRIVATE_PACKAGES_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_ACCESS_TOKEN }}
        run: npm install
      - name: Build
        run: npm run build
      - name: Backup Database
        env:
          APPLICATION_NAME: ${{ vars.APPLICATION_NAME }}
          LOGGLY_TOKEN: ${{ secrets.LOGGLY_TOKEN }}
          LOGGLY_SUBDOMAIN: ${{ secrets.LOGGLY_SUBDOMAIN }}
          LOGGING_DISCORD_WEBHOOK: ${{ secrets.LOGGING_DISCORD_WEBHOOK }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
          APP_ID: ${{ secrets.APP_ID }}
          DBS_TO_BACKUP_CSV: ${{ secrets.DBS_TO_BACKUP_CSV }}
        run: npm run backup-database
